spring.application.name=tracking-service
server.port=8083

spring.datasource.url=jdbc:postgresql://tracking-db:5432/tracking_db
spring.datasource.username=postgres
spring.datasource.password=postgres

eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/registry/eureka
#rabbitmq properties
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true



#redis properties
#spring.cache.type=redis
#spring.data.redis.host=redis
#spring.redis.port=6379

#spring.config.import=optional:configserver:http://localhost:9999/config
spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://config-server:9999/config}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false


#this tells 100% of requests will be traced
management.tracing.sampling.probability=1.0
#this tells Send tracing data to the Zipkin server.
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans


springdoc.override-with-generic-response=false
server.forward-headers-strategy=framework
springdoc.swagger-ui.use-root-path=true