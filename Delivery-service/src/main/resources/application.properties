spring.application.name=delivery-service
server.port=8082

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
#
spring.datasource.url=jdbc:postgresql://delivery-db:5432/delivery_db
spring.datasource.username=postgres
spring.datasource.password=postgres

eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/registry/eureka


spring.cloud.config.override-none=true
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest


spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://config-server:9999/config}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false

springdoc.override-with-generic-response=false
server.forward-headers-strategy=framework


springdoc.swagger-ui.use-root-path=true


#this tells 100% of requests will be traced
management.tracing.sampling.probability=1.0
#this tells Send tracing data to the Zipkin server.
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

