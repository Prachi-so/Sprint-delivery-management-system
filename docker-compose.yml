services:
  eureka-server:
    build: ./eureka-server
    image: eureka-server-image
    ports:
      - "8761:8761"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/registry/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  config-server:
    build: ./config-server
    image: config-server-image
    ports:
      - "9999:9999"
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/config/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  api-gateway:
    build: ./api-gateway
    image: api-gateway-image
    ports:
      - "8888:8888"
    networks:
      - backend
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999/config
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/registry/eureka

  auth-service:
    build: ./auth-service
    image: auth-service-image
    ports:
      - "8081:8081"
    networks:
      - backend
    depends_on:
      auth-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999/config
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/registry/eureka

  auth-db:
    image: postgres:17
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - backend
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  delivery-service:
    build: ./delivery-service
    image: delivery-service-image
    ports:
      - "8082:8082"
    networks:
      - backend
    depends_on:
      delivery-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://delivery-db:5432/delivery_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999/config
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/registry/eureka

  delivery-db:
    image: postgres:17
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - backend
    volumes:
      - delivery-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivery_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  tracking-service:
    build: ./tracking-service
    image: tracking-service-image
    ports:
      - "8083:8083"
    networks:
      - backend
    depends_on:
      tracking-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://tracking-db:5432/tracking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999/config
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/registry/eureka

  tracking-db:
    image: postgres:17
    environment:
      POSTGRES_DB: tracking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    networks:
      - backend
    volumes:
      - tracking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-service:
    build: ./admin-service
    image: admin-service-image
    ports:
      - "8084:8084"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999/config
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/registry/eureka

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - backend

volumes:
  auth-db-data:
  delivery-db-data:
  tracking-db-data:

networks:
  backend:
    driver: bridge